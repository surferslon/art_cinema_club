# fly.toml app configuration file generated for art-cinema-club on 2026-05-14T20:34:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'art-cinema-club'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
